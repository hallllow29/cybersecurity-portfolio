<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pedro Antunes · Portefólio</title>
  <meta name="description" content="Portefólio gerado automaticamente a partir do conteúdo deste repositório." />
  <style>
    :root { --bg:#0f172a; --panel:#0b1220; --ring:#334155; --text:#e5e7eb; --mut:#94a3b8; --acc:#38bdf8; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}
    header{padding:24px 16px 8px;border-bottom:1px solid var(--ring)}
    header h1{margin:0 0 6px;font-size:clamp(24px,2.6vw,36px)}
    .pill{display:inline-block;border:1px solid var(--ring);border-radius:999px;padding:4px 10px;color:var(--mut);font-size:12px;margin-right:8px}
    .container{max-width:1000px;margin:0 auto;padding:18px 16px 40px}
    .panel{background:var(--panel);border:1px solid var(--ring);border-radius:16px;padding:16px;margin-bottom:16px}
    .list{border:1px solid var(--ring);border-radius:12px;overflow:hidden}
    .row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-bottom:1px solid var(--ring);background:#0b1220}
    .row:last-child{border-bottom:0}
    .row a{color:var(--text);text-decoration:none}
    .row a:hover{color:var(--acc)}
    .mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--mut)}
    .readme{background:#0b1220;border:1px solid var(--ring);border-radius:16px;padding:16px}
    .readme h1,.readme h2,.readme h3{scroll-margin-top:80px}
    .readme img{max-width:100%;height:auto;border-radius:8px;display:block;margin:10px 0}
    .breadcrumb{font-size:13px;color:var(--mut);margin-top:6px}
    .breadcrumb a{color:var(--text);text-decoration:none}
    .breadcrumb a:hover{color:var(--acc)}
    footer{color:var(--mut);text-align:center;padding:18px;border-top:1px solid var(--ring)}
  </style>
</head>
<body>
  <header>
    <h1 id="title">hallllow29/cybersecurity-portfolio</h1>
    <span class="pill">branch: <b id="branchName">main</b></span>
    <span class="pill mono" id="repoMeta"></span>
    <div class="breadcrumb" id="breadcrumb"></div>
  </header>

  <div class="container">
    <section class="panel">
      <h3>Conteúdo</h3>
      <div class="list" id="list"></div>
    </section>
    <section class="panel">
      <h3 id="readmeTitle">Sobre</h3>
      <div class="readme" id="readme">(sem README)</div>
    </section>
  </div>

  <footer><span class="mono">HTML + GitHub API • Sem build • GitHub Pages</span></footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
  <script>
  // ===== Config do repo =====
  const owner = "hallllow29";
  const repo  = "cybersecurity-portfolio";
  const branch = "main";

  // ===== Elements =====
  const els = {
    title: document.getElementById('title'),
    branchName: document.getElementById('branchName'),
    repoMeta: document.getElementById('repoMeta'),
    list: document.getElementById('list'),
    readme: document.getElementById('readme'),
    readmeTitle: document.getElementById('readmeTitle'),
    breadcrumb: document.getElementById('breadcrumb'),
  };

  // ===== Utils =====
  const readmeNames = ['README.md','Readme.md','README.MD','readme.md','ReadMe.md'];

  // encode path but keep slashes
  const encPath = p => encodeURI(p).replace(/#/g, '%23');

  function api(path=""){
    const p = path ? encPath(path) : "";
    return `https://api.github.com/repos/${owner}/${repo}/contents/${p}?ref=${encodeURIComponent(branch)}`;
  }
  function raw(path=""){
    const p = path ? encPath(path) : "";
    return `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${p}`;
  }

  async function j(url){ const r = await fetch(url); if(!r.ok) throw new Error(url+" ("+r.status+")"); return r.json(); }
  async function t(url){ const r = await fetch(url); if(!r.ok) throw new Error(url+" ("+r.status+")"); return r.text(); }

  function isAbsUrl(s){ return /^([a-z]+:)?\/\//i.test(s) || s.startsWith('data:'); }
  function dirOf(p){ const i = p.lastIndexOf('/'); return i>=0 ? p.slice(0,i) : ""; }

  // normaliza "a/b/../c/./d.png" e lida com caminhos que começam por "/"
  function normalizePath(p){
    const absRepoRoot = p.startsWith('/');
    const parts = [];
    p.replace(/^\/+/, '').split('/').forEach(seg=>{
      if(!seg || seg === '.') return;
      if(seg === '..') parts.pop(); else parts.push(seg);
    });
    return (absRepoRoot ? '/' : '') + parts.join('/');
  }

  // resolve rel em relação à pasta base, suportando "../" e "/"
  function resolveRel(basePath, rel){
    if (isAbsUrl(rel)) return rel;
    if (rel.startsWith('/')) return normalizePath(rel); // raiz do repositório
    const base = basePath ? basePath.split('/') : [];
    rel.split('/').forEach(seg=>{
      if(!seg || seg === '.') return;
      if(seg === '..') base.pop(); else base.push(seg);
    });
    return normalizePath(base.join('/'));
  }

  function setBreadcrumb(path){
    const parts = path ? path.split('/') : [];
    els.breadcrumb.innerHTML = "";
    const a = document.createElement('a'); a.textContent = 'Início'; a.href = "#";
    a.onclick = (e)=>{e.preventDefault(); navigate("");};
    els.breadcrumb.appendChild(a);
    let acc = "";
    parts.forEach((p,i)=>{
      els.breadcrumb.append(" / ");
      acc += (i?"/":"") + p;
      const link = document.createElement('a'); link.textContent = p; link.href="#";
      link.onclick = (e)=>{ e.preventDefault(); navigate(acc); };
      els.breadcrumb.appendChild(link);
    });
  }

  function fileIcon(name, type){
    if(type==='dir') return '📁';
    const e = name.split('.').pop().toLowerCase();
    if(['png','jpg','jpeg','gif','webp','svg'].includes(e)) return '🖼️';
    if(['md'].includes(e)) return '📝';
    if(['html','css','js','ts'].includes(e)) return '💻';
    if(['json','yml','yaml'].includes(e)) return '⚙️';
    return '📄';
  }

  function row({name, path, type, size, html_url}){
    const el = document.createElement('div'); el.className='row';
    const left = document.createElement('div');
    const link = document.createElement('a'); link.textContent = name; link.href="#";
    if(type==='dir'){
      link.onclick = (e)=>{ e.preventDefault(); navigate(path); };
    }else if(name.toLowerCase().endsWith('.md')){
      link.onclick = async (e)=>{ e.preventDefault(); await showMarkdownFile(path); };
    }else{
      link.href = html_url; link.target = "_blank"; link.rel = "noopener";
    }
    left.innerHTML = `${fileIcon(name,type)}&nbsp;`; left.appendChild(link);
    const right = document.createElement('div'); right.className = 'mono'; right.textContent = size ? `${size} B` : '';
    el.append(left,right); return el;
  }

  async function renderList(path=""){
    const data = await j(api(path));
    els.list.innerHTML = "";
    (Array.isArray(data)?data:[data])
      .sort((a,b)=> (a.type===b.type ? a.name.localeCompare(b.name) : a.type.localeCompare(b.type)))
      .forEach(item => els.list.appendChild(row(item)));
  }

  // tenta mostrar README dessa pasta (várias capitalizações)
  async function showReadmeAt(path=""){
    for(const n of readmeNames){
      try{
        const md = await t(raw(path ? `${path}/${n}` : n));
        await renderMarkdown(md, path);
        els.readmeTitle.textContent = path ? `README — ${path}` : 'Sobre';
        return true;
      }catch{ /* tenta próximo nome */ }
    }
    els.readme.innerHTML = '<span class="mono">(sem README aqui)</span>';
    els.readmeTitle.textContent = path ? `README — ${path}` : 'Sobre';
    return false;
  }

  // mostra QUALQUER .md (não só README), respeitando links/imagens relativas
  async function showMarkdownFile(filePath){
    const md = await t(raw(filePath));
    await renderMarkdown(md, dirOf(filePath));
    els.readmeTitle.textContent = filePath;
  }

  // renderiza markdown e reescreve caminhos relativos (imgs e links)
  async function renderMarkdown(md, basePath){
    const html = marked.parse(md, { breaks:true });
    els.readme.innerHTML = html;

    // imagens relativas → raw
    els.readme.querySelectorAll('img').forEach(img=>{
      const src = img.getAttribute('src') || '';
      if (isAbsUrl(src)) return;
      const joined = resolveRel(basePath, src);
      // se começou por '/', tira a barra para montar URL raw
      const finalPath = joined.startsWith('/') ? joined.slice(1) : joined;
      img.src = raw(finalPath);
    });

    // links relativos: .md navega dentro do site, resto abre raw
    els.readme.querySelectorAll('a').forEach(a=>{
      const href = a.getAttribute('href') || '';
      if (!href || href.startsWith('#') || isAbsUrl(href)) return;
      const joined = resolveRel(basePath, href);
      const finalPath = joined.startsWith('/') ? joined.slice(1) : joined;

      if (/\.md($|[?#])/i.test(href)){
        a.href="#"; a.onclick=(e)=>{ e.preventDefault();
          const folder = finalPath.replace(/\/?README\.md$/i,'').replace(/\.md$/i,'');
          navigate(folder);
        };
      }else{
        a.href = raw(finalPath); a.target = "_blank"; a.rel = "noopener";
      }
    });
  }

  async function navigate(path){
    setBreadcrumb(path);
    await renderList(path);
    await showReadmeAt(path);
  }

  // ===== init =====
  (async function(){
    els.title.textContent = `${owner}/${repo}`;
    els.branchName.textContent = branch;
    els.repoMeta.textContent = new Date().toLocaleDateString();
    await navigate("");
  })();
  </script>
</body>
</html>
